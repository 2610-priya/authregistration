<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | AuthSpace</title>
  <!-- SEO Meta Tags -->
  <meta name="description" content="Securely access your AuthSpace account. Toggle dark mode elements, verify credentials, and connect with analytical tools.">
  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <!-- Dynamic Nebula Backdrop -->
  <div class="space-background"></div>
  <div class="grid-overlay"></div>

  <div class="auth-wrapper">
    <div class="auth-card" id="login-card">
      <div class="auth-header">
        <div class="auth-logo">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>Welcome Back</h1>
        <p>Access your dashboard using secure credentials</p>
      </div>

      <!-- General Form Alert Box -->
      <div id="form-alert" class="form-alert hide">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="alert-message"></span>
      </div>

      <form class="auth-form" id="login-form" novalidate>
        <!-- Email Group -->
        <div class="input-group">
          <div class="input-field-wrapper">
            <input type="email" id="email" class="input-field" placeholder=" " required autocomplete="email">
            <i class="fa-regular fa-envelope input-icon"></i>
            <label for="email" class="input-label">Email Address</label>
          </div>
          <div id="email-validation" class="validation-message">
            <i class="fa-solid fa-circle-xmark"></i> Please enter a valid email address.
          </div>
        </div>

        <!-- Password Group -->
        <div class="input-group">
          <div class="input-field-wrapper">
            <input type="password" id="password" class="input-field" placeholder=" " required autocomplete="current-password">
            <i class="fa-regular fa-lock input-icon"></i>
            <label for="password" class="input-label">Password</label>
            <button type="button" class="password-toggle" id="password-toggle-btn" aria-label="Toggle Password Visibility">
              <i class="fa-regular fa-eye" id="password-eye-icon"></i>
            </button>
          </div>
          <div id="password-validation" class="validation-message">
            <i class="fa-solid fa-circle-xmark"></i> Please enter your password.
          </div>
        </div>

        <!-- Form Helper Row -->
        <div class="form-helper">
          <label class="checkbox-group">
            <input type="checkbox" id="remember-me">
            <span class="custom-checkbox">
              <i class="fa-solid fa-check"></i>
            </span>
            <span>Remember me</span>
          </label>
          <a href="#" class="link-highlight" id="forgot-password-link">Forgot password?</a>
        </div>

        <!-- Login Button -->
        <button type="submit" class="btn-auth" id="btn-submit">
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="spinner hide"></span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html" class="link-highlight">Register Here</a></p>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
