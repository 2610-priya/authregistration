<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuthSpace Loading...</title>
  <script src="js/utils.js"></script>
  <script>
    // Perform client-side routing based on authentication state
    if (session.get()) {
      window.location.replace('dashboard.html');
    } else {
      window.location.replace('login.html');
    }
  </script>
</head>
<body style="background: #090b11; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif;">
  <div style="text-align: center;">
    <div style="width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;"></div>
    <p style="font-size: 14px; opacity: 0.7;">Directing to workspace...</p>
  </div>
  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</body>
</html>
